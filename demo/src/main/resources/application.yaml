spring:
  application:
    name: demo
  datasource:
    url: jdbc:h2:mem:demo
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true

base-kit:
  cors:
    mapping: /**
    allowed-origins:
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-credentials: true
  datasource:
    enabled: true
    write:
      url: jdbc:h2:mem:demo
      driver-class-name: org.h2.Driver
      username: root
      password: secret
      pool:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 3000
        idle-timeout: 600000
        max-lifetime: 1800000
    read:
      url: jdbc:h2:mem:demo
      driver-class-name: org.h2.Driver
      username: root
      password: secret
      pool:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 3000
        idle-timeout: 600000
        max-lifetime: 1800000
